<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCB Inspector</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="page">
    <section class="hero">
      <div class="hero-text">
        <span class="tag">PCB INSPETOR</span>
        <h1>Inspeção automática de placas</h1>
      </div>

      <div class="panel">
        <div class="logo-area">Sistema AOI</div>

        <div class="control-group">
          <div class="field-group">
            <label for="select-csv">Projeto Gabarito (CSV)</label>
            <select id="select-csv">
              <option value="">Carregando projetos da API...</option>
            </select>
          </div>

          <button class="btn-icon" id="btn-novo-projeto" title="Adicionar Novo Projeto">+</button>
        </div>

        <div class="actions">
          <button id="btn-usar-camera">Usar Câmera</button>
          <button id="btn-importar-arquivo">Importar Arquivo</button>
          <input type="file" id="hidden-file-input" accept="image/*" />
        </div>

        <button id="btn-inspecionar" class="btn-full">Inspecionar Placa</button>

        <p id="loading-msg">Processando...</p>
      </div>
    </section>

    <section class="images-container">
      <div class="image-box">
        <label>Foto enviada</label>
        <div class="image-wrapper">
          <img id="img-enviada" src="" alt="Nenhuma imagem" />
          <button class="btn-zoom" onclick="abrirZoom('img-enviada')">Ampliar</button>
        </div>
      </div>

      <div class="image-box">
        <label>Resultado</label>
        <div class="image-wrapper">
          <img id="img-resultado" src="" alt="Aguardando inspeção" />
          <button class="btn-zoom" onclick="abrirZoom('img-resultado')">Ampliar</button>
        </div>
      </div>
    </section>
  </main>

  <div id="modal-projeto" class="modal-overlay">
    <div class="modal-content modal-projeto-card">
      <button class="modal-close" onclick="fecharModal('modal-projeto')">×</button>

      <span class="modal-tag">Cadastro</span>
      <h2>Novo Projeto</h2>
      <p class="modal-description">
        Informe o nome do projeto e selecione o arquivo PCB para gerar a referência da inspeção.
      </p>

      <div class="field-group">
        <label for="nome-projeto">Nome do projeto</label>
        <input type="text" id="nome-projeto" placeholder="Ex: Placa Fonte V3" />
      </div>

      <div class="field-group">
        <label for="arquivo-projeto">Arquivo do projeto</label>

        <label class="file-upload-box" for="arquivo-projeto">
          <span class="file-upload-icon">📁</span>
          <span>
            <strong>Selecionar arquivo</strong>
            <small>.zip ou .kicad_pcb</small>
          </span>
        </label>

        <input type="file" id="arquivo-projeto" accept=".zip,.kicad_pcb" />
        <p id="arquivo-projeto-nome" class="file-name">Nenhum arquivo selecionado</p>
      </div>

      <button class="btn-save-project" onclick="salvarProjeto()">Salvar Projeto</button>
    </div>
  </div>

  <div id="modal-camera" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" onclick="fecharCamera()">×</button>

      <h2>Tirar Foto da Placa</h2>
      <video id="video-preview" autoplay playsinline></video>
      <canvas id="canvas-capture"></canvas>
      <button onclick="capturarFoto()">Capturar</button>
    </div>
  </div>

  <div id="modal-zoom" class="modal-overlay zoom-overlay">
    <button class="btn-close-zoom" onclick="fecharModal('modal-zoom')">×</button>
    <img id="modal-zoom-img" src="" alt="Zoom" />
  </div>

  <script src="script.js"></script>
</body>

</html>
